# This playbook delete a peer to an exisitng organization in an existing Fabric DLT network
# The Kubernetes clusters should already be created and the infomation to connect to the
#  clusters be updated in the network.yaml file that is used as an input to this playbook
###########################################################################################
# To Run this playbook from this directory, use the following command (network.yaml also in this directory)
#  ansible-playbook remove-peer.yaml -e "@/path/to/network.yaml" -e "add_new_org='false'" -e "remove_peer='true'"
############################################################################################
# Please ensure that the ../../shared/configuration playbooks have been run and a DLT network exists.
# Please ensure the orderer certificates are placed on the paths mentioned in orderer.certificate in network.yaml
---
# This will apply to ansible_provisioners. /etc/ansible/hosts should be configured with this group
- hosts: ansible_provisioners
  gather_facts: no
  no_log: "{{ no_ansible_log | default(false) }}"
  tasks:

  # delete build directory
  - name: Remove build directory
    file:
      path: "./build"
      state: absent
 
  # This role creates the value file for peers of organisations.
  - name: Delete all peers
    include_role:
      name: "delete/peers"
    vars:
      build_path: "./build"
      namespace: "{{ org.name | lower}}-net"
      component_type: "{{ org.type | lower}}"
      component_services: "{{ org.services }}"
      kubernetes: "{{ org.k8s }}"
      vault: "{{ org.vault }}"
      git_protocol: "{{ org.gitops.git_protocol }}"
      git_url: "{{ org.gitops.git_url }}"
      git_branch: "{{ org.gitops.branch }}"
      docker_url: "{{ network.docker.url }}"
      charts_dir: "{{ org.gitops.chart_source }}"
      values_dir: "{{playbook_dir}}/../../../{{org.gitops.release_dir}}/{{ org.name | lower }}"
    loop: "{{ network['organizations'] }}"
    loop_control:
      loop_var: org
    when: org.services.peers is defined and org.services.peers | length > 0


  vars: #These variables can be overriden from the command line
    privilege_escalate: false           #Default to NOT escalate to root privledges
    install_os: "linux"                 #Default to linux OS
    install_arch:  "amd64"              #Default to amd64 architecture
    bin_install_dir:  "~/bin"           #Default to /bin install directory for binaries
    add_new_org: 'false'                #Default for this playbook is false
    remove_peer: 'true'                 #Default for this playbook is true
