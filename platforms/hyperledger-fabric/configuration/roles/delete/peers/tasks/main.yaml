##############################################################################################
# This role creates the value file for peers of organisations.
##############################################################################################

# This task creates the build directory if it does not exist
- name: Create build directory if it does not exist
  file:
    path: "./build"
    state: directory

# Set Variable first_peer
- name: "Set Variable first_peer"
  set_fact:
    first_peer: "{{ component_services.peers | map(attribute='name') | first }}"

# Create the value file for peers of organisations 
- name: This role creates the value file for peers of organisations 
  include_tasks: nested_main.yaml
  loop: "{{ component_services.peers }}"
  loop_control:
    loop_var: peer 

# Git Push: Push the above generated files to git directory 
- name: Git Push
  include_role: 
    name: "{{ playbook_dir }}/../../shared/configuration/roles/git_push"
  vars:
    GIT_DIR: "{{ playbook_dir }}/../../../"
    gitops: "{{ org.gitops }}"
    msg: "[ci skip] Pushing Peer files"

# Wait for peer pods to be in the state of terminating
- name: "Waiting for peer pod {{ peer.name }} in {{ org.name | lower }}-net"
  include_role:
    name: "{{ playbook_dir }}/../../shared/configuration/roles/check/k8_component_delete"
  vars:
    component_type: "Pod"
    namespace: "{{ org.name | lower }}-net"
    component_name: "{{ peer.name }}"
    kubernetes: "{{ org.k8s }}"
    label_selectors:
      - app = {{ component_name }}
  loop: "{{ component_services.peers }}"
  loop_control:
    loop_var: peer 
  when: peer.peerstatus is not defined or peer.peerstatus == 'delete'
