global:
  version: 2.5.4
  serviceAccountName: vault-auth
  cluster:
    provider: minikube
    cloudNativeServices: false
  vault:
    type: hashicorp
    network: fabric
    address: http://100.90.5.11:8200
    authPath: devcarrier
    secretEngine: opt/vault
    secretPrefix: "data/devcarrier"
    role: vault-role
    tls: false

image:
  fabricTools: ghcr.io/hyperledger/bevel-fabric-tools
  alpineUtils: ghcr.io/hyperledger/bevel-alpine:latest
  pullSecret: regcred

peerName: peer0
storageClass: storage-peer0
storageSize: 256Mi
localMspId: carrierMSP
tlsStatus: true
ports:
  grpc:
    clusterIpPort: 7051
ordererAddress: orderer1.supplychain-net:7050

labels:
  service:
    - example1: example2
  pvc:
  deployment:
